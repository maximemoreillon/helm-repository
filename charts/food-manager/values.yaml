nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: moreillon/food-manager
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: NodePort
  nodePort: 31081

resources: {}
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # limits:
  #   cpu: 500m
  #   memory: 512Mi

livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 5

securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

env: []
envFrom: []

mongodb:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/mongodb
  persistence:
    size: 100Gi
  auth:
    enabled: false
